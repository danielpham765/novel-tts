---
proxy_gateway:
  enabled: true
  base_url: http://localhost:8888
  mode: direct
  auto_discovery: true
  keys_per_proxy: 2
  direct_run_strategy: proxy_1
  proxies: []

models:
  provider: gemini_http
  enabled_models:
  - gemini-3.1-flash-lite-preview
  - gemma-3-27b-it
  repair_model: gemma-3-27b-it
  glossary_model: 
  model_configs:
    gemma-3-27b-it:
      worker_count: 2
      rpm_limit: 30
      tpm_limit: 15000
      rpd_limit: 14400
      chunk_max_len: 800
    gemini-3.1-flash-lite-preview:
      worker_count: 1
      rpm_limit: 15
      tpm_limit: 250000
      rpd_limit: 500
      repair_model: gemma-3-27b-it
      glossary_model: 
      chunk_max_len: 5000

crawl:
  browser_debug:
    mode: auto
    remote_debugging_url: ''
    remote_debugging_port: 9222
    executable_path: "/snap/bin/chromium"
    user_data_dir: ''
    profile_directory: ''
    headless: false
    debug_image_dir: debug/img

queue:
  redis:
    host: 127.0.0.1
    port: 16379
    database: 1
    prefix: novel_tts
  min_pick_interval_seconds: 2.0
  spawn_key_interval_seconds: 0.1
  max_retries: 3
  inflight_ttl_seconds: 3600
  supervisor_interval_seconds: 15
  status_interval_seconds: 60

tts:
  provider: gradio_vie_tts
  voice: Doan
  server_name: local
  model_name: gpu
  generation_mode: Standard (Một lần)
  use_batch: true
  max_batch_size_run: 64
  temperature: 0.8
  max_chars_chunk: 256
  tempo: 1.15
  bitrate: 96k
  merge_workers: 14

media:
  video:
    use_gpu: true
    media_workers: 14
    visual_workers: 3
    pipeline_mode: per-stage
    crf: 38
  media_batch:
    default_chapter_batch_size: 10
    chapter_batch_overrides: []

upload:
  default_platform: youtube
  youtube:
    enabled: true
    project: rotate
    credentials_path:
    - ".secrets/youtube/client_secrets-1.json"
    - ".secrets/youtube/client_secrets-2.json"
    - ".secrets/youtube/client_secrets-3.json"
    - ".secrets/youtube/client_secrets-4.json"
    token_path:
    - ".secrets/youtube/token-1.json"
    - ".secrets/youtube/token-2.json"
    - ".secrets/youtube/token-3.json"
    - ".secrets/youtube/token-4.json"
    category_id: '22'
    privacy_status: public
    self_declared_made_for_kids: false
    title_file: title.txt
    description_file: description.txt
    playlist_file: playlist.txt
  tiktok:
    enabled: false
    dry_run: true
    client_key: ''
    client_secret: ''
    access_token: ''
    refresh_token: ''
    account_name: ''
    privacy_level: PUBLIC_TO_EVERYONE
    disable_comment: false
    disable_duet: false
    disable_stitch: false
    title_file: title.txt
    description_file: description.txt

pipeline:
  watch:
    novels:
    - tro-lai-dai-hoc
    - thai-hu-chi-ton
    interval_seconds: 86400
    restart_queue: false
    bootstrap_from: 0

