proxy_gateway:
  enabled: false
  base_url: http://localhost:8888
  mode: socket
  auto_discovery: true
  keys_per_proxy: 3
  direct_run_strategy: proxy_1
  # Proxies are proxy node "name" values from `GET /proxies`, e.g. ["cloud-node-1", "cloud-node-2"].
  proxies: []

models:
  provider: gemini_http
  enabled_models:
    - gemini-3.1-flash-lite-preview
    - gemma-3-27b-it
  repair_model: gemma-3-27b-it
  glossary_model: 
  model_configs:
    gemma-3-27b-it:
      worker_count: 2
      rpm_limit: 30
      tpm_limit: 15000
      rpd_limit: 14400
      chunk_max_len: 800
    gemini-3.1-flash-lite-preview:
      worker_count: 1
      rpm_limit: 15
      tpm_limit: 250000
      rpd_limit: 500
      repair_model: gemma-3-27b-it
      glossary_model: 
      chunk_max_len: 5000
    gemma-3-12b-it:
      worker_count: 5
      rpm_limit: 30
      tpm_limit: 15000
      rpd_limit: 14400
      chunk_max_len: 900
    gemini-2.5-flash-lite:
      worker_count: 2
      rpm_limit: 10
      tpm_limit: 250000
      rpd_limit: 20
      chunk_max_len: 2000

tts:
  provider: gradio_vie_tts
  voice: Ly
  server_name: local
  model_name: macos
  generation_mode: Standard (Một lần)
  use_batch: true
  max_batch_size_run: 64
  temperature: 0.8
  max_chars_chunk: 256
  tempo: 1.15
  bitrate: 192k

queue:
  redis:
    host: 127.0.0.1
    port: 6379
    database: 1
    prefix: novel_tts
  min_pick_interval_seconds: 2.0
  spawn_key_interval_seconds: 0.1
  max_retries: 3
  inflight_ttl_seconds: 3600
  supervisor_interval_seconds: 15
  status_interval_seconds: 60

upload:
  default_platform: youtube
  youtube:
    enabled: true
    credentials_path: .secrets/youtube/client_secrets.json
    token_path: .secrets/youtube/token.json
    category_id: "22"
    privacy_status: public
    self_declared_made_for_kids: false
    title_file: title.txt
    description_file: description.txt
    playlist_file: playlist.txt
  tiktok:
    enabled: false
    dry_run: true
    client_key: ""
    client_secret: ""
    access_token: ""
    refresh_token: ""
    account_name: ""
    privacy_level: PUBLIC_TO_EVERYONE
    disable_comment: false
    disable_duet: false
    disable_stitch: false
    title_file: title.txt
    description_file: description.txt
